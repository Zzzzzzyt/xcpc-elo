# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"
        run: npm ci --registry=https://registry.npmjs.org
      - name: Restore CPCFinder crawl cache
        id: cpcfinder-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ./out/cpcfinder
          key: cpcfinder-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            cpcfinder-${{ runner.os }}-${{ github.ref_name }}-
            cpcfinder-${{ runner.os }}-
      - name: Build dashboard workflow
        run: npm run workflow:elo-dashboard
      - name: Save CPCFinder crawl cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ./out/cpcfinder
          key: cpcfinder-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out/frontend'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
