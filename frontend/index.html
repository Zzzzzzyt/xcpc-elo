<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XCPC ELO</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="backdrop-grid"></div>

    <main class="layout">
      <header class="hero panel">
        <h1>XCPC ELO</h1>
        <p id="subtitle">正在加载数据...</p>
      </header>

      <section class="content-grid">
        <section class="panel leaderboard">
          <div class="panel-head">
            <div class="controls">
              <input id="searchInput" type="search" placeholder="按姓名 / 学校 / ID 搜索..." />
              <select id="sortSelect">
                <option value="current">排序：当前分</option>
                <option value="top">排序：历史最高分</option>
                <option value="contests">排序：参赛次数</option>
              </select>
              <div class="date-filter-group">
                <label for="lastCompetedSinceInput">最后参赛不早于</label>
                <input id="lastCompetedSinceInput" type="date" />
                <button id="clearLastCompetedFilterButton" type="button">清除筛选</button>
              </div>
            </div>
          </div>
          <div class="table-wrap" style="max-height: 65vh;">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>队员</th>
                  <th>学校</th>
                  <th>当前分</th>
                  <th>历史最高</th>
                  <th>&Delta;</th>
                  <th>参赛次数</th>
                </tr>
              </thead>
              <tbody id="leaderboardBody"></tbody>
            </table>
          </div>
          <p id="leaderboardHint" class="hint"></p>
        </section>

        <section class="panel player-detail">
          <div class="panel-head">
            <h2 id="playerName">选手详情</h2>
            <p id="playerOrganization"></p>
          </div>
          <p id="playerMeta"></p>
          <div class="chart-wrap">
            <div id="ratingChart"></div>
          </div>
          <div class="table-wrap" style="max-height: 40vh;">
            <table>
              <thead>
                <tr>
                  <th>比赛</th>
                  <th>日期</th>
                  <th>名次</th>
                  <th>&Delta;</th>
                  <th>分数</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
          <p id="historyHint" class="hint"></p>
        </section>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
